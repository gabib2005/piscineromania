name: Deploy to Production

on:
  push:
    branches: [production]

jobs:
  deploy:
    name: FTP Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ftp.piscineromania.ro
          port: 21
          username: Gabib@piscineromania.ro
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./
          server-dir: /shop_test398153.ro/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/vendor/**
            .github/**
            public/design-preview/**
          state-name: .ftp-deploy-sync-state-v2.json

      - name: Clear Laravel Cache
        run: |
          curl -s https://shop.piscineromania.ro/rc_clear_pr2025.php || true
          curl -s https://shop.piscineromania.ro/clearcache.php || true
